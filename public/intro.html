<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restore</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Jost:wght@300&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
background:#0c0805;
color:white;
font-family:Jost;
}

canvas{
position:fixed;
inset:0;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.title{
font-family:"Cormorant Garamond";
font-size:70px;
letter-spacing:.25em;
}

.tagline{
letter-spacing:.35em;
font-size:12px;
margin-top:15px;
color:#8fb87a;
}

.enter{
position:absolute;
bottom:8%;
left:50%;
transform:translateX(-50%);
padding:14px 40px;
border:1px solid #8fb87a;
background:none;
color:#8fb87a;
letter-spacing:.3em;
cursor:pointer;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="center">

<div style="font-size:40px">🌱</div>

<div class="title">
RESTORE
</div>

<div class="tagline">
Where Understanding Grows
</div>

</div>

<button class="enter" onclick="enterApp()">ENTER</button>

<script>

function enterApp(){
window.location.href="/dashboard"
}

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

let w,h

function resize(){
w=canvas.width=window.innerWidth
h=canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

let particles=[]

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*w,
y:Math.random()*h,
r:Math.random()*2,
v:Math.random()*0.5
})
}

function draw(){

ctx.fillStyle="#0c0805"
ctx.fillRect(0,0,w,h)

ctx.fillStyle="rgba(143,184,122,.6)"

particles.forEach(p=>{

p.y-=p.v

if(p.y<0){
p.y=h
p.x=Math.random()*w
}

ctx.beginPath()
ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
