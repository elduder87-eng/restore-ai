<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restore — Intro Animation</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --soil:    #1a120a;
    --bark:    #2e1f0e;
    --moss:    #3a5c2c;
    --leaf:    #5d8a3c;
    --sage:    #8fb87a;
    --mist:    #c8ddb0;
    --cream:   #f5f0e8;
    --gold:    #c9a84c;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--soil);
    font-family: 'Jost', sans-serif;
  }

  /* ── CANVAS ── */
  canvas#bg {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    opacity: 0;
    animation: fadeIn 1.2s 0.2s ease forwards;
  }

  /* ── VIGNETTE ── */
  .vignette {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 60%, transparent 30%, rgba(10,6,2,.72) 100%);
    z-index: 2;
  }

  /* ── SOIL LINE ── */
  .soil-line {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 38%;
    background: linear-gradient(to top, #0d0805 0%, #1a120a 60%, transparent 100%);
    z-index: 3;
  }

  /* ── STEM ── */
  .stem-wrap {
    position: fixed;
    left: 50%; bottom: 22%;
    transform: translateX(-50%);
    z-index: 4;
    display: flex; flex-direction: column; align-items: center;
  }

  .stem {
    width: 2px;
    height: 0;
    background: linear-gradient(to top, #3a5c2c, #6faa4a);
    border-radius: 2px;
    animation: growStem 1.4s 1.1s cubic-bezier(.22,1,.36,1) forwards;
    transform-origin: bottom center;
    box-shadow: 0 0 8px rgba(111,170,74,.3);
  }

  @keyframes growStem {
    to { height: 220px; }
  }

  /* ── LEAVES ── */
  .leaves {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
  }

  .leaf {
    position: absolute;
    bottom: 0;
    width: 0; height: 0;
    opacity: 0;
  }

  /* Left leaf */
  .leaf-l {
    left: -2px;
    animation: unfurlLeft 1s cubic-bezier(.22,1,.36,1) forwards;
  }
  .leaf-l svg { transform-origin: right center; transform: scaleX(0) rotate(-20deg); animation: leafScaleL 1s 2.5s cubic-bezier(.22,1,.36,1) forwards; }

  /* Right leaf */
  .leaf-r {
    right: -2px;
    animation: unfurlRight 1s cubic-bezier(.22,1,.36,1) forwards;
  }
  .leaf-r svg { transform-origin: left center; transform: scaleX(0) rotate(20deg); animation: leafScaleR 1s 2.8s cubic-bezier(.22,1,.36,1) forwards; }

  /* Top sprout */
  .leaf-t {
    left: 50%; bottom: 215px;
    transform: translateX(-50%);
    animation: unfurlTop 1s 3.0s cubic-bezier(.22,1,.36,1) forwards;
  }
  .leaf-t svg { transform-origin: center bottom; transform: scaleY(0); animation: leafScaleT 1s 3.0s cubic-bezier(.22,1,.36,1) forwards; }

  @keyframes unfurlLeft  { to { opacity: 1; bottom: 120px; left: -40px; } }
  @keyframes unfurlRight { to { opacity: 1; bottom: 100px; right: -40px; } }
  @keyframes unfurlTop   { to { opacity: 1; } }
  @keyframes leafScaleL  { to { transform: scaleX(1) rotate(-20deg); } }
  @keyframes leafScaleR  { to { transform: scaleX(1) rotate(20deg); } }
  @keyframes leafScaleT  { to { transform: scaleY(1); } }

  svg.leaf-svg { overflow: visible; filter: drop-shadow(0 4px 12px rgba(60,130,40,.35)); }

  /* ── PARTICLES (pollen dots) ── */
  .pollen { position: fixed; pointer-events: none; z-index: 5; }
  .pollen span {
    position: absolute;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    animation: floatPollen var(--dur, 4s) var(--delay, 0s) ease-in-out infinite;
  }
  @keyframes floatPollen {
    0%   { opacity: 0; transform: translate(0, 0) scale(.4); }
    20%  { opacity: .7; }
    80%  { opacity: .3; }
    100% { opacity: 0; transform: translate(var(--tx, -30px), -160px) scale(.1); }
  }

  /* ── LIGHT RAY ── */
  .light-ray {
    position: fixed;
    top: -20%; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 80vh;
    background: radial-gradient(ellipse at top, rgba(200,221,176,.08) 0%, transparent 70%);
    z-index: 2;
    opacity: 0;
    animation: rayIn 2s 2s ease forwards;
  }
  @keyframes rayIn { to { opacity: 1; } }

  /* ── TEXT ── */
  .title-wrap {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }

  .logo-icon {
    font-size: 2rem;
    display: block;
    opacity: 0;
    transform: translateY(6px);
    animation: wordUp .8s 0.6s ease forwards;
    margin-bottom: .5rem;
    filter: drop-shadow(0 0 16px rgba(200,221,176,.5));
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(4rem, 12vw, 9rem);
    letter-spacing: .18em;
    color: var(--cream);
    text-transform: uppercase;
    line-height: 1;
    display: flex;
    gap: .04em;
    overflow: hidden;
  }

  .title span {
    display: inline-block;
    opacity: 0;
    transform: translateY(110%);
    animation: letterUp .9s cubic-bezier(.22,1,.36,1) forwards;
    text-shadow: 0 2px 40px rgba(200,221,176,.18);
  }

  .tagline {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: clamp(.7rem, 1.5vw, .95rem);
    letter-spacing: .5em;
    text-transform: uppercase;
    color: var(--sage);
    margin-top: 1.2rem;
    opacity: 0;
    animation: wordUp 1s 2.2s ease forwards;
    white-space: nowrap;
  }

  .divider {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--sage), transparent);
    margin: .9rem auto 0;
    animation: lineGrow 1.2s 2.6s ease forwards;
  }
  @keyframes lineGrow { to { width: 200px; } }

  @keyframes letterUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes wordUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* stagger letters */
  .title span:nth-child(1)  { animation-delay: 1.0s; }
  .title span:nth-child(2)  { animation-delay: 1.08s; }
  .title span:nth-child(3)  { animation-delay: 1.16s; }
  .title span:nth-child(4)  { animation-delay: 1.24s; }
  .title span:nth-child(5)  { animation-delay: 1.32s; }
  .title span:nth-child(6)  { animation-delay: 1.40s; }
  .title span:nth-child(7)  { animation-delay: 1.48s; }

  /* ── ENTER BUTTON ── */
  .enter-btn {
    position: fixed;
    bottom: 8%; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: none; border: 1px solid rgba(143,184,122,.4);
    color: var(--sage);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: .8rem;
    letter-spacing: .45em;
    text-transform: uppercase;
    padding: .9rem 2.8rem;
    cursor: pointer;
    opacity: 0;
    animation: wordUp 1s 3.4s ease forwards;
    transition: background .3s, border-color .3s, color .3s, box-shadow .3s;
  }
  .enter-btn:hover {
    background: rgba(143,184,122,.08);
    border-color: var(--sage);
    color: var(--cream);
    box-shadow: 0 0 32px rgba(143,184,122,.18);
  }

  @keyframes fadeIn { to { opacity: 1; } }

  /* ── RIPPLE RINGS ── */
  .rings {
    position: fixed;
    bottom: 22%; left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    pointer-events: none;
  }
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(111,170,74,.25);
    opacity: 0;
    transform: translate(-50%, -50%);
    animation: ripple 3.5s var(--rd, 0s) ease-out infinite;
  }
  @keyframes ripple {
    0%   { width: 4px; height: 4px; opacity: .6; }
    100% { width: 260px; height: 260px; opacity: 0; }
  }
</style>
</head>
<body>

<!-- Particle canvas -->
<canvas id="bg"></canvas>

<!-- Atmospheric rays -->
<div class="light-ray"></div>
<div class="vignette"></div>
<div class="soil-line"></div>

<!-- Pollen -->
<div class="pollen" id="pollen"></div>

<!-- Ripple rings at root -->
<div class="rings">
  <div class="ring" style="--rd:3.2s"></div>
  <div class="ring" style="--rd:4.4s"></div>
  <div class="ring" style="--rd:5.6s"></div>
</div>

<!-- Plant -->
<div class="stem-wrap">
  <div class="leaves">
    <!-- left leaf -->
    <div class="leaf leaf-l" style="animation-delay:2.4s">
      <svg class="leaf-svg" width="80" height="46" viewBox="0 0 80 46">
        <path d="M78,2 Q20,-10 2,40 Q30,50 78,2Z" fill="#4a7a30" opacity=".9"/>
        <path d="M78,2 Q44,14 2,40" stroke="#6faa4a" stroke-width="1" fill="none" opacity=".6"/>
      </svg>
    </div>
    <!-- right leaf -->
    <div class="leaf leaf-r" style="animation-delay:2.7s">
      <svg class="leaf-svg" width="80" height="46" viewBox="0 0 80 46" style="transform:scaleX(-1)">
        <path d="M78,2 Q20,-10 2,40 Q30,50 78,2Z" fill="#5d8a3c" opacity=".85"/>
        <path d="M78,2 Q44,14 2,40" stroke="#8fb87a" stroke-width="1" fill="none" opacity=".5"/>
      </svg>
    </div>
    <!-- top sprout -->
    <div class="leaf leaf-t">
      <svg class="leaf-svg" width="34" height="54" viewBox="0 0 34 54">
        <path d="M17,52 Q-2,30 17,2 Q36,30 17,52Z" fill="#6faa4a" opacity=".95"/>
        <path d="M17,52 Q17,30 17,2" stroke="#c8ddb0" stroke-width=".8" fill="none" opacity=".5"/>
      </svg>
    </div>
  </div>
  <div class="stem"></div>
</div>

<!-- Headline -->
<div class="title-wrap">
  <span class="logo-icon">🌱</span>
  <div class="title" aria-label="Restore">
    <span>R</span><span>E</span><span>S</span><span>T</span><span>O</span><span>R</span><span>E</span>
  </div>
  <div class="divider"></div>
  <p class="tagline">Where Understanding Grows</p>
</div>

<button class="enter-btn">Enter</button>

<script>
  /* ── CANVAS: firefly / spore particles ── */
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  let W, H, sparks = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = ['rgba(143,184,122,', 'rgba(201,168,76,', 'rgba(200,221,176,'];

  class Spark {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = H * .4 + Math.random() * H * .45;
      this.r = .4 + Math.random() * 1.8;
      this.vx = (Math.random() - .5) * .3;
      this.vy = -(.2 + Math.random() * .7);
      this.alpha = 0;
      this.maxAlpha = .15 + Math.random() * .45;
      this.life = 0;
      this.maxLife = 120 + Math.random() * 180;
      this.col = COLORS[Math.floor(Math.random() * COLORS.length)];
    }
    step() {
      this.life++;
      const t = this.life / this.maxLife;
      this.alpha = t < .2 ? this.maxAlpha * (t / .2)
                 : t > .8 ? this.maxAlpha * ((1 - t) / .2)
                 : this.maxAlpha;
      this.x += this.vx + Math.sin(this.life * .04) * .25;
      this.y += this.vy;
      if (this.life >= this.maxLife) this.reset();
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = this.col + this.alpha + ')';
      ctx.fill();
    }
  }

  for (let i = 0; i < 90; i++) {
    const s = new Spark();
    s.life = Math.random() * s.maxLife; // stagger
    sparks.push(s);
  }

  /* subtle soil gradient background */
  function drawBg() {
    const g = ctx.createRadialGradient(W/2, H*.65, 0, W/2, H*.65, Math.max(W,H)*.8);
    g.addColorStop(0,   '#1e1208');
    g.addColorStop(.5,  '#120c06');
    g.addColorStop(1,   '#080503');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function loop() {
    drawBg();
    sparks.forEach(s => { s.step(); s.draw(); });
    requestAnimationFrame(loop);
  }
  loop();

  /* ── POLLEN DOM particles ── */
  const pollenEl = document.getElementById('pollen');
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('span');
    const size = 2 + Math.random() * 4;
    const delay = 3 + Math.random() * 5;
    const dur   = 3 + Math.random() * 4;
    const tx    = (Math.random() - .5) * 120;
    Object.assign(d.style, {
      width: size + 'px', height: size + 'px',
      left: (30 + Math.random() * 40) + '%',
      bottom: (20 + Math.random() * 20) + '%',
      '--dur': dur + 's', '--delay': delay + 's', '--tx': tx + 'px',
    });
    pollenEl.appendChild(d);
  }
</script>
</body>
</html>
