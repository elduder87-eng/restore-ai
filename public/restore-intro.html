<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restore — Intro Animation</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

<style>

*, *::before, *::after {margin:0;padding:0;box-sizing:border-box;}

:root{
--soil:#1a120a;
--moss:#3a5c2c;
--leaf:#5d8a3c;
--sage:#8fb87a;
--mist:#c8ddb0;
--cream:#f5f0e8;
--gold:#c9a84c;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:var(--soil);
font-family:'Jost',sans-serif;
}

/* Canvas */
canvas#bg{
position:fixed;
inset:0;
width:100%;
height:100%;
opacity:0;
animation:fadeIn 1.2s .2s forwards;
}

/* Vignette */
.vignette{
position:fixed;
inset:0;
background:radial-gradient(ellipse at 50% 60%,transparent 30%,rgba(10,6,2,.72) 100%);
z-index:2;
}

/* Soil line */

.soil-line{
position:fixed;
bottom:0;
left:0;
right:0;
height:38%;
background:linear-gradient(to top,#0d0805 0%,#1a120a 60%,transparent 100%);
z-index:3;
}

/* Plant */

.stem-wrap{
position:fixed;
left:50%;
bottom:22%;
transform:translateX(-50%);
z-index:4;
display:flex;
flex-direction:column;
align-items:center;
}

.stem{
width:2px;
height:0;
background:linear-gradient(to top,#3a5c2c,#6faa4a);
border-radius:2px;
animation:growStem 1.4s 1.1s forwards;
}

@keyframes growStem{
to{height:220px;}
}

/* Title */

.title-wrap{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

.logo-icon{
font-size:2rem;
opacity:0;
animation:wordUp .8s .6s forwards;
margin-bottom:.5rem;
}

.title{
font-family:'Cormorant Garamond',serif;
font-weight:300;
font-size:clamp(4rem,12vw,9rem);
letter-spacing:.18em;
color:var(--cream);
display:flex;
gap:.04em;
}

.title span{
opacity:0;
transform:translateY(110%);
animation:letterUp .9s forwards;
}

.title span:nth-child(1){animation-delay:1s}
.title span:nth-child(2){animation-delay:1.08s}
.title span:nth-child(3){animation-delay:1.16s}
.title span:nth-child(4){animation-delay:1.24s}
.title span:nth-child(5){animation-delay:1.32s}
.title span:nth-child(6){animation-delay:1.40s}
.title span:nth-child(7){animation-delay:1.48s}

.tagline{
font-size:.9rem;
letter-spacing:.5em;
color:var(--sage);
margin-top:1.2rem;
opacity:0;
animation:wordUp 1s 2.2s forwards;
}

.divider{
width:0;
height:1px;
background:linear-gradient(90deg,transparent,var(--sage),transparent);
margin:.9rem auto 0;
animation:lineGrow 1.2s 2.6s forwards;
}

@keyframes lineGrow{to{width:200px}}
@keyframes letterUp{to{opacity:1;transform:translateY(0)}}
@keyframes wordUp{to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{to{opacity:1}}

/* Fade overlay */

.fade-overlay{
position:fixed;
inset:0;
background:#080503;
z-index:100;
opacity:0;
transition:opacity 1s ease;
}

.fade-overlay.active{
opacity:1;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="vignette"></div>
<div class="soil-line"></div>

<div class="stem-wrap">
<div class="stem"></div>
</div>

<div class="title-wrap">
<span class="logo-icon">🌱</span>

<div class="title">
<span>R</span><span>E</span><span>S</span><span>T</span><span>O</span><span>R</span><span>E</span>
</div>

<div class="divider"></div>
<p class="tagline">Where Understanding Grows</p>
</div>

<div class="fade-overlay" id="fadeOverlay"></div>

<script>

/* Canvas particles */

const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');

let W,H,sparks=[];

function resize(){
W=canvas.width=window.innerWidth;
H=canvas.height=window.innerHeight;
}

resize();
window.addEventListener('resize',resize);

const COLORS=[
'rgba(143,184,122,',
'rgba(201,168,76,',
'rgba(200,221,176,'
];

class Spark{

constructor(){this.reset();}

reset(){
this.x=Math.random()*W;
this.y=H*.4+Math.random()*H*.45;
this.r=.4+Math.random()*1.8;
this.vx=(Math.random()-.5)*.3;
this.vy=-(.2+Math.random()*.7);
this.alpha=0;
this.maxAlpha=.15+Math.random()*.45;
this.life=0;
this.maxLife=120+Math.random()*180;
this.col=COLORS[Math.floor(Math.random()*COLORS.length)];
}

step(){

this.life++;

const t=this.life/this.maxLife;

this.alpha=t<.2?this.maxAlpha*(t/.2)
:t>.8?this.maxAlpha*((1-t)/.2)
:this.maxAlpha;

this.x+=this.vx+Math.sin(this.life*.04)*.25;
this.y+=this.vy;

if(this.life>=this.maxLife)this.reset();
}

draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
ctx.fillStyle=this.col+this.alpha+')';
ctx.fill();
}

}

for(let i=0;i<90;i++){
const s=new Spark();
s.life=Math.random()*s.maxLife;
sparks.push(s);
}

function drawBg(){

const g=ctx.createRadialGradient(W/2,H*.65,0,W/2,H*.65,Math.max(W,H)*.8);

g.addColorStop(0,'#1e1208');
g.addColorStop(.5,'#120c06');
g.addColorStop(1,'#080503');

ctx.fillStyle=g;
ctx.fillRect(0,0,W,H);
}

function loop(){
drawBg();
sparks.forEach(s=>{
s.step();
s.draw();
});
requestAnimationFrame(loop);
}

loop();

/* Redirect after animation */

setTimeout(()=>{

const overlay=document.getElementById('fadeOverlay');
overlay.classList.add('active');

setTimeout(()=>{
window.location.href="/dashboard";
},1000);

},6000);

</script>

</body>
</html>
