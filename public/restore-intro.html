<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restore — Intro Animation</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

<style>

/* ----- base reset ----- */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
--soil:#1a120a;
--leaf:#5d8a3c;
--sage:#8fb87a;
--cream:#f5f0e8;
--gold:#c9a84c;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:var(--soil);
font-family:'Jost',sans-serif;
}

/* canvas */
canvas#bg{
position:fixed;
inset:0;
width:100%;
height:100%;
}

/* plant container */
.stem-wrap{
position:fixed;
left:50%;
bottom:22%;
transform:translateX(-50%);
display:flex;
flex-direction:column;
align-items:center;
}

/* stem */
.stem{
width:2px;
height:0;
background:linear-gradient(to top,#3a5c2c,#6faa4a);
animation:growStem 1.4s 1.1s forwards;
}

@keyframes growStem{
to{height:220px;}
}

/* title */
.title-wrap{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.title{
font-family:'Cormorant Garamond',serif;
font-size:clamp(4rem,12vw,9rem);
letter-spacing:.18em;
color:var(--cream);
display:flex;
gap:.04em;
justify-content:center;
}

.title span{
opacity:0;
transform:translateY(100%);
animation:letterUp .8s forwards;
}

@keyframes letterUp{
to{opacity:1;transform:translateY(0);}
}

.title span:nth-child(1){animation-delay:1s}
.title span:nth-child(2){animation-delay:1.08s}
.title span:nth-child(3){animation-delay:1.16s}
.title span:nth-child(4){animation-delay:1.24s}
.title span:nth-child(5){animation-delay:1.32s}
.title span:nth-child(6){animation-delay:1.40s}
.title span:nth-child(7){animation-delay:1.48s}

.tagline{
letter-spacing:.5em;
color:var(--sage);
margin-top:1rem;
font-size:.9rem;
opacity:.8;
}

/* ENTER BUTTON */

.enter-btn{
position:fixed;
bottom:8%;
left:50%;
transform:translateX(-50%);
background:none;
border:1px solid rgba(143,184,122,.4);
color:var(--sage);
letter-spacing:.45em;
padding:.9rem 2.8rem;
cursor:pointer;
transition:.3s;
}

.enter-btn:hover{
background:rgba(143,184,122,.08);
color:white;
box-shadow:0 0 20px rgba(143,184,122,.4);
}

</style>
</head>


<body>

<canvas id="bg"></canvas>

<div class="stem-wrap">
<div class="stem"></div>
</div>


<div class="title-wrap">

<div class="title">
<span>R</span>
<span>E</span>
<span>S</span>
<span>T</span>
<span>O</span>
<span>R</span>
<span>E</span>
</div>

<p class="tagline">Where Understanding Grows</p>

</div>


<button class="enter-btn" onclick="enterRestore()">ENTER</button>



<script>

/* particle background */

const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');

let W,H;

function resize(){
W=canvas.width=window.innerWidth;
H=canvas.height=window.innerHeight;
}

resize();
window.addEventListener('resize',resize);

let sparks=[];

class Spark{

constructor(){this.reset();}

reset(){
this.x=Math.random()*W;
this.y=H*.4+Math.random()*H*.45;
this.r=Math.random()*2;
this.vy=-(.2+Math.random()*.7);
}

step(){
this.y+=this.vy;
if(this.y<0)this.reset();
}

draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
ctx.fillStyle="rgba(200,221,176,.5)";
ctx.fill();
}

}

for(let i=0;i<90;i++)sparks.push(new Spark());

function loop(){

ctx.fillStyle="#1a120a";
ctx.fillRect(0,0,W,H);

sparks.forEach(s=>{
s.step();
s.draw();
});

requestAnimationFrame(loop);

}

loop();


/* ENTER BUTTON ROUTING */

function enterRestore(){

window.location.href="/dashboard";

}

</script>

</body>
</html>
