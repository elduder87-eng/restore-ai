<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0, interactive-widget=resizes-visual"/>
<title>Restore \u2014 Your Learning Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#05080f;--border:rgba(255,255,255,0.08);
  --text:#e2e8f0;--muted:#64748b;
  --blue:#38bdf8;--green:#4ade80;--purple:#c084fc;
  --gold:#fbbf24;--red:#f87171;--teal:#2dd4bf;--orange:#fb923c;
}
html,body{width:100%;height:100%;overflow:hidden;overscroll-behavior:none;
  background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);}
body{position:fixed;inset:0;}

#bg{position:fixed;inset:0;z-index:0;}
#uni{position:fixed;inset:0;z-index:1;pointer-events:none;}
#hit{position:fixed;inset:0;z-index:5;pointer-events:all;touch-action:pan-x pan-y;background:transparent;}
.ui{position:fixed;inset:0;z-index:25;display:grid;grid-template-rows:56px 1fr;pointer-events:none;}
.ui>*{pointer-events:all;}

/* TOPBAR */
.topbar{display:flex;align-items:center;padding:0 16px;gap:12px;
  background:rgba(5,8,15,0.8);border-bottom:1px solid var(--border);height:56px;}
.brand{display:flex;align-items:center;gap:8px;min-width:0;flex-shrink:0;}
.brand-icon{width:34px;height:34px;flex-shrink:0;border-radius:50%;
  background:conic-gradient(from 180deg,#38bdf8,#818cf8,#c084fc,#38bdf8);
  display:flex;align-items:center;justify-content:center;
  animation:spin 10s linear infinite;font-size:14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.brand-name{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.02em;white-space:nowrap;}
.brand-sub{font-size:10px;color:var(--muted);}
.nav{display:flex;gap:2px;flex:1;justify-content:center;overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nb{padding:6px 14px;border-radius:24px;font-size:12px;font-weight:500;color:var(--muted);
  background:none;border:1px solid transparent;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap;}
.nb.active{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.15);}
.tr{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;}
.av{display:flex;align-items:center;gap:6px;}
.av-img{width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#818cf8,#c084fc);border:2px solid rgba(255,255,255,0.2);flex-shrink:0;}
.av-name{font-size:12px;font-weight:500;color:#fff;white-space:nowrap;}
.ib{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.07);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:13px;cursor:pointer;flex-shrink:0;}

/* MAIN LAYOUT */
.main{display:grid;grid-template-columns:240px 1fr 255px;height:100%;gap:0;overflow:hidden;}

/* PANELS */
.left,.right{
  background:rgba(5,8,20,0.55);border-right:1px solid var(--border);
  overflow-y:auto;scrollbar-width:none;padding:14px 12px;}
.left::-webkit-scrollbar,.right::-webkit-scrollbar{display:none;}
.right{border-right:none;border-left:1px solid var(--border);}

.center{display:flex;flex-direction:column;position:relative;pointer-events:none;}
.center>*{pointer-events:all;}

/* PANEL COMPONENTS */
.sec{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:10px;}
.pb{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:6px;overflow:hidden;}
.pf{height:100%;border-radius:2px;transition:width .6s;}
.lmr{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.lmr:last-child{border-bottom:none;}
.lmi{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.
